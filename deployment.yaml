apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordcounter-deployment
  labels:
    app: wordcounter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wordcounter
  template:
    metadata:
      labels:
        app: wordcounter
    spec:
      containers:
      - name: wordcounter-bot
        image: your-dockerhub-username/wordcounter-bot:latest # Replace with your container image path
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: TELEGRAM_TOKEN
          valueFrom:
            secretKeyRef:
              name: telegram-secret
              key: token
---
apiVersion: v1
kind: Service
metadata:
  name: wordcounter-service
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: wordcounter
